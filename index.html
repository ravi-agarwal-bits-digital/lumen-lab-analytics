<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Cohort Lab Usage — BITS Pilani Digital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ============================== CONFIG-DRIVEN THEME ============================== */
:root{
  --ink:#0e1518; --ink2:#13201f; --panel:#16201f; --panel2:#1b2826;
  --line:#26332f; --line2:#324340;
  --txt:#e8e6df; --txt-dim:#9fb0aa; --txt-mute:#6f8079;
  --teal:#2f9c8f; --teal-soft:#1d3a37; --teal-bright:#46c2b1;
  --gold:#c8a24a; --gold-soft:#3a3017;
  --good:#5aa777; --warn:#d9a441; --bad:#c8694e; --bad-soft:#3a221c;
  --shadow:0 1px 0 rgba(255,255,255,.02), 0 12px 30px -18px rgba(0,0,0,.7);
  --serif:'Fraunces',Georgia,serif; --sans:'IBM Plex Sans',system-ui,sans-serif; --mono:'IBM Plex Mono',monospace;
  --r:14px;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--ink);color:var(--txt);font-family:var(--sans);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased}
body{background:radial-gradient(1200px 600px at 80% -10%, #15211f 0%, var(--ink) 55%)}
h1,h2,h3{font-family:var(--serif);font-weight:600;letter-spacing:-.01em;margin:0}
a{color:var(--teal-bright);text-decoration:none}
button{font-family:inherit;cursor:pointer}
.mono{font-family:var(--mono)}
.dim{color:var(--txt-dim)} .mute{color:var(--txt-mute)}
::selection{background:var(--teal-soft)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:8px}
::-webkit-scrollbar-track{background:transparent}

/* ---------- login ---------- */
#gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--ink);z-index:50}
#gate .card{width:min(420px,92vw);background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:34px 30px;box-shadow:var(--shadow)}
#gate h1{font-size:25px;margin-bottom:4px}
#gate p{color:var(--txt-dim);margin:0 0 22px;font-size:13px}
#gate input{width:100%;padding:12px 14px;background:var(--ink2);border:1px solid var(--line2);border-radius:10px;color:var(--txt);font-family:var(--mono);font-size:14px;margin-bottom:12px}
#gate input:focus{outline:none;border-color:var(--teal)}
#gate button{width:100%;padding:12px;background:var(--teal);color:#04110f;border:none;border-radius:10px;font-weight:600;font-size:14px}
#gate button:hover{background:var(--teal-bright)}
#gate .err{color:var(--bad);font-size:12.5px;min-height:18px;margin-top:6px}
.kicker{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--teal);margin-bottom:12px}

/* ---------- shell ---------- */
#app{display:none;max-width:1180px;margin:0 auto;padding:30px 26px 90px}
header.top{display:flex;flex-wrap:wrap;gap:18px;align-items:flex-end;justify-content:space-between;padding-bottom:22px;border-bottom:1px solid var(--line);margin-bottom:26px}
header.top h1{font-size:30px;line-height:1.1}
header.top .sub{color:var(--txt-dim);font-size:13px;margin-top:6px}
.controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.controls select,.controls input[type=date]{background:var(--panel);border:1px solid var(--line2);color:var(--txt);border-radius:9px;padding:8px 10px;font-family:var(--sans);font-size:13px}
.controls label{font-size:11px;color:var(--txt-mute);font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:3px}
.controls .grp{display:flex;flex-direction:column}
.btn-ghost{background:var(--panel);border:1px solid var(--line2);color:var(--txt-dim);border-radius:9px;padding:8px 12px;font-size:12.5px}
.btn-ghost:hover{color:var(--txt);border-color:var(--teal)}

section.block{margin:34px 0}
.sec-head{display:flex;align-items:baseline;gap:12px;margin-bottom:14px}
.sec-head .num{font-family:var(--mono);font-size:12px;color:var(--gold);letter-spacing:.1em;padding-top:3px}
.sec-head h2{font-size:20px}
.sec-head .note{color:var(--txt-mute);font-size:12.5px;margin-left:auto}

/* ---------- kpi ---------- */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px 17px;cursor:pointer;transition:border-color .15s,transform .15s;box-shadow:var(--shadow);position:relative}
.kpi:hover{border-color:var(--teal);transform:translateY(-2px)}
.kpi .lbl{font-size:11.5px;color:var(--txt-dim);text-transform:uppercase;letter-spacing:.07em;font-family:var(--mono)}
.kpi .val{font-family:var(--serif);font-size:30px;font-weight:600;margin-top:8px;line-height:1}
.kpi .cap{font-size:11.5px;color:var(--txt-mute);margin-top:7px}
.kpi.problem{border-color:var(--bad-soft);background:linear-gradient(180deg,rgba(200,105,78,.06),transparent)}
.kpi.problem .val{color:var(--bad)} .kpi.problem:hover{border-color:var(--bad)}
.kpi .arrow{position:absolute;top:14px;right:14px;color:var(--txt-mute);font-size:13px;opacity:0;transition:opacity .15s}
.kpi:hover .arrow{opacity:1}

/* ---------- cards / charts ---------- */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:20px;box-shadow:var(--shadow)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:820px){.grid2{grid-template-columns:1fr}.controls{width:100%}}
.bar-row{display:grid;grid-template-columns:200px 1fr auto;gap:12px;align-items:center;padding:7px 0;cursor:pointer;border-radius:8px}
.bar-row:hover{background:var(--ink2)}
.bar-row .name{font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-left:6px}
.bar-track{background:var(--ink2);border-radius:6px;height:22px;overflow:hidden;position:relative}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--teal-soft),var(--teal));border-radius:6px}
.bar-val{font-family:var(--mono);font-size:12.5px;color:var(--txt-dim);min-width:64px;text-align:right;padding-right:6px}
.funnel-stage{cursor:pointer;border-radius:8px;padding:4px}
.funnel-stage:hover{background:var(--ink2)}
.leak{display:flex;align-items:center;gap:8px;color:var(--bad);font-size:12px;font-family:var(--mono);margin:2px 0 2px 8px}
.leak svg{flex:none}
.lead-row{display:grid;grid-template-columns:30px 1fr 120px auto;gap:12px;align-items:center;padding:8px 6px;border-radius:8px;cursor:pointer;border-bottom:1px solid var(--line)}
.lead-row:hover{background:var(--ink2)}
.lead-row .rank{font-family:var(--mono);color:var(--gold);font-size:13px}
.lead-row .who{overflow:hidden}
.lead-row .who .n{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lead-row .who .e{font-size:11px;color:var(--txt-mute);font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.band{font-size:10.5px;font-family:var(--mono);padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.band.power{background:var(--gold-soft);color:var(--gold)}
.band.active{background:var(--teal-soft);color:var(--teal-bright)}
.band.light{background:#22302c;color:var(--txt-dim)}
.band.trivial{background:#2a241a;color:var(--warn)}
.band.never{background:var(--bad-soft);color:var(--bad)}
.split-bar{height:8px;border-radius:5px;overflow:hidden;display:flex;background:var(--ink2);margin-top:5px}
.split-bar .eng{background:var(--teal)} .split-bar .idle{background:var(--bad)}
.legend{display:flex;gap:16px;font-size:11.5px;color:var(--txt-dim);margin-top:6px;flex-wrap:wrap}
.legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:middle}
text{font-family:var(--mono)}
.empty{color:var(--txt-mute);font-size:13px;padding:24px;text-align:center;border:1px dashed var(--line2);border-radius:10px}

/* ---------- explorer ---------- */
.exp-tools{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.exp-tools input{flex:1;min-width:180px;background:var(--ink2);border:1px solid var(--line2);color:var(--txt);border-radius:9px;padding:9px 12px;font-size:13px}
.tbl-wrap{max-height:460px;overflow:auto;border:1px solid var(--line);border-radius:12px}
table{border-collapse:collapse;width:100%;font-size:12.5px}
thead th{position:sticky;top:0;background:var(--panel2);text-align:left;padding:10px 12px;font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--txt-dim);cursor:pointer;white-space:nowrap;border-bottom:1px solid var(--line2);z-index:2}
thead th:hover{color:var(--teal-bright)}
tbody td{padding:9px 12px;border-bottom:1px solid var(--line);white-space:nowrap}
tbody tr:hover{background:var(--ink2)}
.num-cell{font-family:var(--mono);text-align:right}

/* ---------- drawer ---------- */
#scrim{position:fixed;inset:0;background:rgba(4,8,8,.55);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:opacity .2s;z-index:60}
#scrim.on{opacity:1;pointer-events:auto}
#drawer{position:fixed;top:0;right:0;height:100%;width:min(560px,96vw);background:var(--panel);border-left:1px solid var(--line2);transform:translateX(100%);transition:transform .24s cubic-bezier(.4,0,.2,1);z-index:61;display:flex;flex-direction:column;box-shadow:-20px 0 50px -20px rgba(0,0,0,.8)}
#drawer.on{transform:translateX(0)}
.dr-head{padding:20px 22px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:12px}
.dr-head h3{font-size:18px;flex:1}
.dr-head .x{background:var(--ink2);border:1px solid var(--line2);color:var(--txt-dim);border-radius:8px;width:32px;height:32px;font-size:16px;line-height:1}
.dr-head .x:hover{color:var(--txt)}
.dr-sub{font-size:12px;color:var(--txt-mute);font-family:var(--mono);margin-top:4px}
.dr-tools{padding:12px 22px;border-bottom:1px solid var(--line);display:flex;gap:10px;align-items:center}
.dr-body{overflow:auto;flex:1;padding:6px 14px 30px}
.dr-item{border:1px solid var(--line);border-radius:10px;margin:8px 0;overflow:hidden}
.dr-item summary{padding:11px 14px;cursor:pointer;list-style:none;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}
.dr-item summary::-webkit-details-marker{display:none}
.dr-item summary:hover{background:var(--ink2)}
.dr-item .nm{font-size:13px}
.dr-item .meta{font-size:11px;color:var(--txt-mute);font-family:var(--mono);margin-top:2px}
.dr-item .tag{font-family:var(--mono);font-size:11.5px;color:var(--teal-bright)}
.dr-raw{padding:0 14px 12px;font-family:var(--mono);font-size:11.5px;color:var(--txt-dim)}
.dr-raw div{display:grid;grid-template-columns:130px 1fr;gap:8px;padding:3px 0;border-top:1px solid var(--line)}
.dr-raw .k{color:var(--txt-mute)}
.dlbtn{background:var(--teal);color:#04110f;border:none;border-radius:8px;padding:8px 13px;font-size:12.5px;font-weight:600}
.dlbtn:hover{background:var(--teal-bright)}

/* ---------- methodology ---------- */
details.method{margin-top:46px;border-top:1px solid var(--line);padding-top:18px}
details.method summary{cursor:pointer;font-family:var(--mono);font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt-dim)}
details.method summary:hover{color:var(--teal-bright)}
details.method .body{font-size:13px;color:var(--txt-dim);max-width:760px;margin-top:14px}
details.method h4{font-family:var(--sans);font-size:13px;color:var(--txt);margin:16px 0 4px}
details.method code{font-family:var(--mono);background:var(--ink2);padding:1px 5px;border-radius:4px;font-size:12px;color:var(--teal-bright)}
footer{margin-top:30px;color:var(--txt-mute);font-size:11.5px;font-family:var(--mono)}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

<div id="gate">
  <div class="card">
    <div class="kicker">BITS Pilani Digital</div>
    <h1>Cohort Lab Usage</h1>
    <p>Restricted analytics. Enter the access password to decrypt the report in your browser.</p>
    <input id="pw" type="password" placeholder="Access password" autocomplete="current-password">
    <button id="enter">Unlock</button>
    <div class="err" id="gerr"></div>
  </div>
</div>

<div id="app"></div>

<div id="scrim"></div>
<aside id="drawer">
  <div class="dr-head"><div style="flex:1"><h3 id="drTitle">—</h3><div class="dr-sub" id="drSub"></div></div><button class="x" id="drClose">×</button></div>
  <div class="dr-tools"><button class="dlbtn" id="drCsv">Export CSV (full values)</button><span class="dr-sub" id="drCount"></span></div>
  <div class="dr-body" id="drBody"></div>
</aside>

<script>
/* =================================================================================
   CONFIG  —  confirm / change these
   ================================================================================= */
const DATA_FILE = 'data/cohort-report.csv';      // CSV on the repo (NOT xlsx for this report)
const PASSWORD_HASH = 'c33cf8fc5aa884baed13a7cd33300f9cea032afbee87ad79a53853cb17206ba8'; // SHA-256 of the access password ("cohort2025"). To change: hash a new one.
const SESSION_TIMEOUT_MINS = 30;
const MASK_PII = true;   // mask emails/names on screen; full values only in CSV exports
const TZ_NOTE = "All times shown exactly as recorded in the source (the platform's own timezone). No conversion is applied.";

/* thresholds (compute hours) used for funnel + outcome bands */
const T_USED = 0.1;    // >6 min of compute = "used"
const T_ENG  = 1.0;    // >=1h = "engaged"
const T_ACT  = 6.0;    // >=6h = "power"

/* =================================================================================
   CRYPTO  —  AES-256-GCM, must match admin uploader
   File layout: [9B "AANYAENC1"][16B salt][12B IV][ciphertext]
   ================================================================================= */
const MAGIC = "AANYAENC1";
const te = new TextEncoder(), td = new TextDecoder();
async function sha256hex(str){
  const b = await crypto.subtle.digest('SHA-256', te.encode(str));
  return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');
}
async function deriveKey(pw, salt){
  const base = await crypto.subtle.importKey('raw', te.encode(pw), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    {name:'PBKDF2', salt, iterations:150000, hash:'SHA-256'},
    base, {name:'AES-GCM', length:256}, false, ['decrypt']);
}
async function maybeDecrypt(buf, pw){
  const bytes = new Uint8Array(buf);
  const magic = td.decode(bytes.slice(0, MAGIC.length));
  if(magic !== MAGIC) return td.decode(bytes);           // plain CSV
  const salt = bytes.slice(9, 25);
  const iv   = bytes.slice(25, 37);
  const ct   = bytes.slice(37);
  const key  = await deriveKey(pw, salt);
  const pt   = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, ct);
  return td.decode(pt);
}

/* =================================================================================
   CSV PARSE (hand-rolled, RFC4180) — guarantees exact-string fidelity, no Date coercion
   ================================================================================= */
function parseCSV(text){
  const rows=[]; let i=0, field='', row=[], inq=false; const n=text.length;
  // strip BOM
  if(text.charCodeAt(0)===0xFEFF) text=text.slice(1);
  while(i<text.length){
    const c=text[i];
    if(inq){
      if(c==='"'){ if(text[i+1]==='"'){field+='"';i+=2;continue;} inq=false;i++;continue; }
      field+=c;i++;continue;
    }
    if(c==='"'){inq=true;i++;continue;}
    if(c===','){row.push(field);field='';i++;continue;}
    if(c==='\r'){i++;continue;}
    if(c==='\n'){row.push(field);rows.push(row);row=[];field='';i++;continue;}
    field+=c;i++;
  }
  if(field.length||row.length){row.push(field);rows.push(row);}
  return rows;
}

/* =================================================================================
   PARSE HELPERS — integers straight from the string, never Date()
   ================================================================================= */
function parseMDY(s){            // "MM/DD/YYYY" -> {key,Y,M,D}
  s=(s||'').trim(); const m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/); if(!m) return null;
  const M=+m[1],D=+m[2],Y=+m[3]; return {Y,M,D,key:Y*10000+M*100+D};
}
function parseDateTime(s){       // "MM/DD/YYYY HH:MM:SS" (24h) -> {key,Y,M,D,h,mi}
  s=(s||'').trim(); const m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})\s+(\d{1,2}):(\d{2}):(\d{2})$/); if(!m) return null;
  const M=+m[1],D=+m[2],Y=+m[3],h=+m[4],mi=+m[5]; return {Y,M,D,h,mi,key:Y*10000+M*100+D};
}
function parseDurationH(s){      // "11:11:51 PM" | "1 day, 9:15:18" | "HH:MM:SS" -> hours
  s=(s||'').trim(); if(!s) return null;
  let days=0; let m=s.match(/^(\d+)\s*day[s]?,\s*(.+)$/i); if(m){days=+m[1];s=m[2].trim();}
  m=s.match(/^(\d{1,2}):(\d{2}):(\d{2})(?:\s*(AM|PM))?$/i); if(!m) return null;
  let h=+m[1]; const mi=+m[2],se=+m[3], ap=m[4]&&m[4].toUpperCase();
  if(ap==='AM'&&h===12)h=0; else if(ap==='PM'&&h!==12)h+=12;
  return days*24 + h + mi/60 + se/3600;
}
const MN=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtKey(k){ if(!k) return '—'; const Y=Math.floor(k/10000),M=Math.floor(k/100)%100,D=k%100; return `${MN[M]} ${D}, ${Y}`; }
function fmtDT(o){ if(!o) return '—'; const h12=((o.h+11)%12)+1, ap=o.h<12?'AM':'PM'; return `${MN[o.M]} ${o.D}, ${o.Y}  ${h12}:${String(o.mi).padStart(2,'0')} ${ap}`; }
function fmtH(x){ if(x==null) return '—'; if(x<1) return (x*60).toFixed(0)+' min'; return x.toFixed(2)+' h'; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function maskEmail(e){ if(!MASK_PII) return e; const m=String(e).match(/^(.{1,2}).*?(@.*)$/); return m?m[1]+'…'+m[2]:'…'; }
function maskName(n){ if(!MASK_PII) return n; return String(n).split(/\s+/).filter(Boolean).map(w=>w[0]?w[0].toUpperCase()+'.':'').join(''); }

/* =================================================================================
   RECORD MODEL + AGGREGATION  (kept pure so Node validation reuses identical logic)
   ================================================================================= */
function buildRecords(text){
  const rows = parseCSV(text);
  const hdr = rows[0].map(h=>h.trim());
  const ix = {}; hdr.forEach((h,i)=>ix[h]=i);
  const recs=[];
  for(let r=1;r<rows.length;r++){
    const row=rows[r]; if(!row || row.every(c=>c.trim()==='')) continue;
    const g=name=>(row[ix[name]]!=null?row[ix[name]]:'').trim();
    const fs=parseDateTime(g('First Seen')), ls=parseDateTime(g('Last Seen'));
    const ec2h=parseFloat(g('Hours Used'))||0;
    const connh=parseDurationH(g('Connection Time'));
    const connected = !!fs;
    const idleh = connected ? Math.max(0, ec2h-(connh||0)) : ec2h;
    const cohort = (g('Half year')+' '+g('Year')).trim();
    const rec={
      i:recs.length, user:g('User'), userName:g('User Name'), course:g('Course'),
      status:g('Status'), startKey:(parseMDY(g('Start Date'))||{}).key||0,
      ec2h, connh, fs, ls, connected, idleh, cohort,
      ec2raw:g('EC2 Total Time'), connraw:g('Connection Time'),
      band:'' , raw:{}
    };
    hdr.forEach(h=>rec.raw[h]=g(h));
    rec.band = classify(rec);
    recs.push(rec);
  }
  return recs;
}
function classify(r){
  if(!r.connected) return 'never';
  if(r.ec2h < T_USED) return 'trivial';
  if(r.ec2h < T_ENG)  return 'light';
  if(r.ec2h < T_ACT)  return 'active';
  return 'power';
}
const BAND_INFO = {
  power:  {label:'Power',  reason:'≥6 compute-hours — sustained, heavy lab use.'},
  active: {label:'Active', reason:'1–6 compute-hours — meaningful working sessions.'},
  light:  {label:'Light',  reason:'Connected but under 1 hour of compute.'},
  trivial:{label:'Trivial',reason:'Connected but under ~6 minutes — likely a look-in.'},
  never:  {label:'Never connected', reason:'Lab provisioned but no session ever recorded — wasted provisioning.'}
};

/* aggregation primitives */
const sum=(a,f)=>a.reduce((s,x)=>s+(f?f(x):x),0);
const div=(a,b)=>b?a/b:0;
const uniq=(a,f)=>new Set(a.map(f)).size;

/* =================================================================================
   STATE + FILTERS
   ================================================================================= */
const STATE = { all:[], cohort:'__all', from:'', to:'' };
function cohortPool(){ return STATE.cohort==='__all' ? STATE.all : STATE.all.filter(r=>r.cohort===STATE.cohort); }
function rangeKeys(){
  const f=STATE.from?+STATE.from.replaceAll('-',''):null;
  const t=STATE.to?+STATE.to.replaceAll('-',''):null; return [f,t];
}
function inRange(r){ const [f,t]=rangeKeys(); if(!r.fs) return false; if(f&&r.fs.key<f)return false; if(t&&r.fs.key>t)return false; return true; }
function rangeActive(){ return !!(STATE.from||STATE.to); }

/* =================================================================================
   RENDER
   ================================================================================= */
const $=s=>document.querySelector(s);
function render(){
  const pool = cohortPool();
  const cohorts = [...new Set(STATE.all.map(r=>r.cohort))];
  const html = [];
  html.push(`<header class="top">
    <div>
      <div class="kicker">BITS Pilani Digital · Lab Analytics</div>
      <h1>Cohort Lab Usage</h1>
      <div class="sub">${pool.length} provisioned labs · ${uniq(pool,r=>r.user)} learners · ${pool.length?fmtKey(Math.min(...pool.map(r=>r.startKey).filter(Boolean))):'—'} cohort</div>
    </div>
    <div class="controls">
      <div class="grp"><label>Cohort</label><select id="fCohort"><option value="__all">All cohorts</option>${cohorts.map(c=>`<option value="${esc(c)}" ${c===STATE.cohort?'selected':''}>${esc(c)}</option>`).join('')}</select></div>
      <div class="grp"><label>Activity from</label><input type="date" id="fFrom" value="${STATE.from}"></div>
      <div class="grp"><label>to</label><input type="date" id="fTo" value="${STATE.to}"></div>
      <div class="grp"><label>&nbsp;</label><button class="btn-ghost" id="fClear">Clear dates</button></div>
    </div>
  </header>`);
  html.push(`<div id="secs"></div>`);
  $('#app').innerHTML = html.join('');

  ].join('');
  // wire controls
  $('#fCohort').onchange=e=>{STATE.cohort=e.target.value;render();};
  $('#fFrom').onchange=e=>{STATE.from=e.target.value;render();};

  $('#fClear').onclick=()=>{STATE.from='';STATE.to='';render();};

/* ---- 01 KPI ---- */
function secKPI(p){
  const learners=uniq(p,r=>r.user);
  const conn=p.filter(r=>r.connected);
  const hrs=sum(p,r=>r.ec2h);
  const idle=sum(p,r=>r.idleh);
  const never=p.filter(r=>!r.connected);
  const actHrs=conn.map(r=>r.ec2h).sort((a,b)=>a-b);
  const med=actHrs.length?actHrs[Math.floor(actHrs.length/2)]:0;
  const K=(lbl,val,cap,drill,prob)=>`<div class="kpi ${prob?'problem':''}" data-drill="${drill}"><span class="arrow">↗</span><div class="lbl">${lbl}</div><div class="val">${val}</div><div class="cap">${cap}</div></div>`;
  return sec('01','Headline',`Snapshot of provisioning, activation and compute. Tap any tile to inspect the underlying labs.`,
    `<div class="kpis">
      ${K('Provisioned labs',p.length,'learner × course instances','all')}
      ${K('Distinct learners',learners,'unique accounts','learners')}
      ${K('Compute hours',hrs.toFixed(0)+' h','total instance uptime','allhours')}
      ${K('Activation rate',(div(conn.length,p.length)*100).toFixed(0)+'%',conn.length+' ever connected','connected')}
      ${K('Never-activated labs',never.length,(div(never.length,p.length)*100).toFixed(0)+'% provisioned, never used','never',true)}
      ${K('Idle compute',idle.toFixed(0)+' h','uptime with no matching engagement','idle',true)}
      ${K('Median active load',fmtH(med),'per connected lab','connected')}
    </div>`);
}

/* ---- 02 Funnel ---- */
function secFunnel(p){
  const stages=[
    ['Provisioned', p.length, 'all'],
    ['Connected', p.filter(r=>r.connected).length, 'connected'],
    ['Used compute (>6 min)', p.filter(r=>r.ec2h>=T_USED).length, 'used'],
    ['Engaged (≥1 h)', p.filter(r=>r.ec2h>=T_ENG).length, 'engaged'],
  ];
  const max=stages[0][1]||1;
  let body='';
  stages.forEach((s,i)=>{
    const pct=div(s[1],max)*100;
    body+=`<div class="funnel-stage" data-drill="${s[2]}">
      <div class="bar-row" style="grid-template-columns:200px 1fr auto">
        <div class="name">${esc(s[0])}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct.toFixed(1)}%"></div></div>
        <div class="bar-val">${s[1]} · ${pct.toFixed(0)}%</div>
      </div></div>`;
    if(i<stages.length-1){
      const lost=s[1]-stages[i+1][1]; const lpct=div(lost,s[1])*100;
      if(lost>0) body+=`<div class="leak">${warnIcon()} ${lost} dropped here (${lpct.toFixed(0)}% leak)</div>`;
    }
  });
  return sec('02','Activation funnel','From a provisioned lab to genuine engagement. Leaks show where labs fall away.',`<div class="card">${body||emptyEl()}</div>`);
}

/* ---- 03 By course ---- */
function secCourse(p){
  const by={}; p.forEach(r=>{(by[r.course]=by[r.course]||[]).push(r);});
  const rows=Object.entries(by).map(([c,arr])=>({c,n:arr.length,conn:arr.filter(r=>r.connected).length,hrs:sum(arr,r=>r.ec2h)}))
    .sort((a,b)=>b.n-a.n);
  if(!rows.length) return sec('03','By course','',`<div class="card">${emptyEl()}</div>`);
  const max=Math.max(...rows.map(r=>r.n));
  const body=rows.map(r=>`<div class="bar-row" data-drill="course:${esc(r.c)}">
      <div class="name" title="${esc(r.c)}">${esc(r.c)}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(div(r.n,max)*100).toFixed(1)}%"></div></div>
      <div class="bar-val">${r.n} labs · ${(div(r.conn,r.n)*100).toFixed(0)}% act · ${r.hrs.toFixed(0)}h</div>
    </div>`).join('');
  return sec('03','By course','Labs provisioned per course, with activation rate and compute hours.',`<div class="card">${body}</div>`);
}

/* ---- 04 Trend ---- */
function secTrend(p){
  const act=p.filter(r=>r.fs && (!rangeActive()||inRange(r)));
  if(!act.length) return sec('04','Activation trend',rangeNote(),`<div class="card">${emptyEl('No first-seen activity in this selection.')}</div>`);
  const days={}; act.forEach(r=>{days[r.fs.key]=(days[r.fs.key]||0)+1;});
  const keys=Object.keys(days).map(Number).sort((a,b)=>a-b);
  // earlier vs recent split
  const mid=keys[Math.floor(keys.length/2)];
  const early=sum(keys.filter(k=>k<mid),k=>days[k]), recent=sum(keys.filter(k=>k>=mid),k=>days[k]);
  const mv = recent>=early?`<span style="color:var(--good)">▲ rising</span>`:`<span style="color:var(--warn)">▼ cooling</span>`;
  return sec('04','Activation trend',rangeNote(),
    `<div class="card">
      ${lineChart(keys.map(k=>({k,v:days[k]})))}
      <div class="legend">First activations per day. Earlier half: <b class="mono">${early}</b> · recent half: <b class="mono">${recent}</b> &nbsp; ${mv}</div>
    </div>`);
}

/* ---- 05 Leaderboard ---- */
function secLeader(p){
  const conn=[...p.filter(r=>r.connected)].sort((a,b)=>b.ec2h-a.ec2h).slice(0,15);
  if(!conn.length) return sec('05','Heaviest compute','',`<div class="card">${emptyEl()}</div>`);
  const body=conn.map((r,i)=>{
    const engPct=div((r.connh||0),r.ec2h)*100;
    return `<div class="lead-row" data-drill="rec:${r.i}">
      <div class="rank">${i+1}</div>
      <div class="who"><div class="n">${esc(maskName(r.userName))}</div><div class="e">${esc(maskEmail(r.user))} · ${esc(r.course)}</div>
        <div class="split-bar"><div class="eng" style="width:${engPct}%"></div><div class="idle" style="width:${100-engPct}%"></div></div></div>
      <div><span class="band ${r.band}">${BAND_INFO[r.band].label}</span></div>
      <div class="bar-val">${r.ec2h.toFixed(2)} h</div>
    </div>`;
  }).join('');
  return sec('05','Heaviest compute','Ranked purely by compute hours (transparent score). Bar splits engaged (teal) vs idle (red) time.',
    `<div class="card">${body}<div class="legend"><span><i style="background:var(--teal)"></i>Engaged time</span><span><i style="background:var(--bad)"></i>Idle uptime</span></div></div>`);
}

/* ---- 06 Multi-course ---- */
function secMulti(p){
  const by={}; p.forEach(r=>{(by[r.user]=by[r.user]||[]).push(r);});
  const multi=Object.entries(by).filter(([,a])=>a.length>1)
    .map(([u,a])=>({u,ref:a[0].i,name:a[0].userName,n:a.length,hrs:sum(a,r=>r.ec2h),conn:a.filter(r=>r.connected).length}))
    .sort((a,b)=>b.n-a.n||b.hrs-a.hrs).slice(0,15);
  if(!multi.length) return sec('06','Multi-course learners','No learner appears in more than one course in this selection.',`<div class="card">${emptyEl()}</div>`);
  const body=multi.map(m=>`<div class="lead-row" style="grid-template-columns:1fr 120px auto" data-drill="user:${m.ref}">
      <div class="who"><div class="n">${esc(maskName(m.name))}</div><div class="e">${esc(maskEmail(m.u))}</div></div>
      <div class="mono dim" style="font-size:12px">${m.conn}/${m.n} activated</div>
      <div class="bar-val">${m.n} courses · ${m.hrs.toFixed(0)}h</div>
    </div>`).join('');
  return sec('06','Multi-course learners','Learners enrolled across several labs — grouped by account.',`<div class="card">${body}</div>`);
}

/* ---- 07 Time rhythm ---- */
function secRhythm(p){
  const act=p.filter(r=>r.fs && (!rangeActive()||inRange(r)));
  if(!act.length) return sec('07','Time rhythm',rangeNote(),`<div class="card">${emptyEl('No activity timestamps in this selection.')}</div>`);
  const hours=new Array(24).fill(0); act.forEach(r=>hours[r.fs.h]++);
  return sec('07','Time rhythm',TZ_NOTE,
    `<div class="card">${hourBars(hours)}<div class="legend">First connection by hour of day — staffing & support timing.</div></div>`);
}

/* ---- 08 Distribution ---- */
function secDist(p){
  const buckets=[
    ['0 (never used)', r=>r.ec2h===0, 'hist:0'],
    ['<6 min', r=>r.ec2h>0&&r.ec2h<0.1, 'hist:t'],
    ['6 min–1 h', r=>r.ec2h>=0.1&&r.ec2h<1, 'hist:l'],
    ['1–3 h', r=>r.ec2h>=1&&r.ec2h<3, 'hist:a1'],
    ['3–6 h', r=>r.ec2h>=3&&r.ec2h<6, 'hist:a2'],
    ['6–12 h', r=>r.ec2h>=6&&r.ec2h<12, 'hist:p1'],
    ['12 h+', r=>r.ec2h>=12, 'hist:p2'],
  ];
  const counts=buckets.map(b=>({lbl:b[0],n:p.filter(b[1]).length,drill:b[2]}));
  const max=Math.max(1,...counts.map(c=>c.n));
  const body=counts.map(c=>`<div class="bar-row" data-drill="${c.drill}">
      <div class="name">${esc(c.lbl)}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(div(c.n,max)*100).toFixed(1)}%"></div></div>
      <div class="bar-val">${c.n}</div></div>`).join('');
  return sec('08','Compute distribution','How lab uptime is spread across all instances.',`<div class="card">${body}</div>`);
}

/* ---- 09 Outcome ---- */
function secOutcome(p){
  const order=['power','active','light','trivial','never'];
  const by={}; order.forEach(b=>by[b]=p.filter(r=>r.band===b));
  const max=Math.max(1,...order.map(b=>by[b].length));
  const body=order.map(b=>`<div class="bar-row" data-drill="band:${b}">
      <div class="name"><span class="band ${b}">${BAND_INFO[b].label}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${(div(by[b].length,max)*100).toFixed(1)}%;background:${bandColor(b)}"></div></div>
      <div class="bar-val">${by[b].length}</div></div>
      <div class="dr-sub" style="margin:0 0 8px 6px">${esc(BAND_INFO[b].reason)}</div>`).join('');
  return sec('09','Outcome classification','Every lab assigned to exactly one band by its strongest compute signal.',`<div class="card">${body}</div>`);
}
function bandColor(b){return {power:'var(--gold)',active:'var(--teal)',light:'var(--line2)',trivial:'var(--warn)',never:'var(--bad)'}[b];}

/* ---- 10 Explorer ---- */
let EXP={sort:'ec2h',dir:-1,q:''};
function secExplorer(p){
  return sec('10','Explorer','Full table. Sort by any column, search, expand a row for the raw record. CSV export is full-value.',
    `<div class="card">
      <div class="exp-tools">
        <input id="expQ" placeholder="Search name, email, course, status…" value="${esc(EXP.q)}">
        <button class="dlbtn" id="expCsv">Export CSV (full values)</button>
      </div>
      <div class="tbl-wrap"><table id="expTbl"></table></div>
    </div>`);
}
const EXP_COLS=[
  ['userName','Learner',r=>esc(maskName(r.userName))],
  ['user','Account',r=>`<span class="mono">${esc(maskEmail(r.user))}</span>`],
  ['course','Course',r=>esc(r.course)],
  ['cohort','Cohort',r=>esc(r.cohort)],
  ['status','Status',r=>esc(r.status)],
  ['ec2h','Compute h',r=>`<span class="num-cell">${r.ec2h.toFixed(2)}</span>`],
  ['connh','Engaged h',r=>`<span class="num-cell">${r.connh==null?'—':r.connh.toFixed(2)}</span>`],
  ['fs','First seen',r=>r.fs?fmtDT(r.fs):'<span class="mute">never</span>'],
  ['band','Band',r=>`<span class="band ${r.band}">${BAND_INFO[r.band].label}</span>`],
];
function wireExplorer(pool){
  const drawTbl=()=>{
    let rows=pool.filter(r=>{
      if(!EXP.q) return true; const q=EXP.q.toLowerCase();
      return (r.userName+' '+r.user+' '+r.course+' '+r.status+' '+r.cohort).toLowerCase().includes(q);
    });
    rows.sort((a,b)=>{
      let av=a[EXP.sort], bv=b[EXP.sort];
      if(EXP.sort==='fs'){av=a.fs?a.fs.key*10000+a.fs.h*60+a.fs.mi:0; bv=b.fs?b.fs.key*10000+b.fs.h*60+b.fs.mi:0;}
      if(typeof av==='string'){return EXP.dir*av.localeCompare(bv);}
      return EXP.dir*((av||0)-(bv||0));
    });
    const head=`<thead><tr>${EXP_COLS.map(c=>`<th data-col="${c[0]}">${c[1]}${EXP.sort===c[0]?(EXP.dir<0?' ▾':' ▴'):''}</th>`).join('')}</tr></thead>`;
    const body=`<tbody>${rows.length?rows.map(r=>`<tr data-drill="rec:${r.i}" style="cursor:pointer">${EXP_COLS.map(c=>`<td>${c[2](r)}</td>`).join('')}</tr>`).join(''):`<tr><td colspan="${EXP_COLS.length}"><div class="empty">No rows match.</div></td></tr>`}</tbody>`;
    $('#expTbl').innerHTML=head+body;
    $('#expTbl').querySelectorAll('th').forEach(th=>th.onclick=()=>{const c=th.dataset.col; if(EXP.sort===c)EXP.dir*=-1; else {EXP.sort=c;EXP.dir=(c==='userName'||c==='user'||c==='course'||c==='status'||c==='cohort')?1:-1;} drawTbl();});
  };
  drawTbl();
  $('#expQ').oninput=e=>{EXP.q=e.target.value;drawTbl();};
  $('#expCsv').onclick=()=>exportCSV(pool,'cohort-explorer');
}

/* ---- shared chart builders (inline SVG) ---- */
function lineChart(pts){
  const W=680,H=170,pad=28; if(!pts.length) return emptyEl();
  const xs=pts.map(p=>p.k), maxV=Math.max(...pts.map(p=>p.v));
  const x=i=>pad+(pts.length<2?0:(W-2*pad)*i/(pts.length-1));
  const y=v=>H-pad-(H-2*pad)*div(v,maxV);
  const d=pts.map((p,i)=>`${i?'L':'M'}${x(i).toFixed(1)} ${y(p.v).toFixed(1)}`).join(' ');
  const area=`${d} L${x(pts.length-1).toFixed(1)} ${H-pad} L${x(0).toFixed(1)} ${H-pad} Z`;
  const ticks=pts.filter((_,i)=>i%Math.ceil(pts.length/6)===0);
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="max-height:200px">
    <path d="${area}" fill="var(--teal-soft)" opacity=".5"/>
    <path d="${d}" fill="none" stroke="var(--teal)" stroke-width="2"/>
    ${pts.map((p,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(p.v).toFixed(1)}" r="2.4" fill="var(--teal-bright)"/>`).join('')}
    ${ticks.map(p=>{const i=pts.indexOf(p);return `<text x="${x(i).toFixed(1)}" y="${H-8}" font-size="9" fill="var(--txt-mute)" text-anchor="middle">${fmtKey(p.k).replace(/, \d+$/,'')}</text>`;}).join('')}
    <text x="${pad}" y="14" font-size="9" fill="var(--txt-mute)">peak ${maxV}/day</text>
  </svg>`;
}
function hourBars(hours){
  const W=680,H=160,pad=24,n=24,gap=4; const max=Math.max(1,...hours);
  const bw=(W-2*pad)/n-gap;
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="max-height:190px">
    ${hours.map((v,i)=>{const h=(H-2*pad)*div(v,max);const x=pad+i*((W-2*pad)/n);const y=H-pad-h;
      return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" rx="2" fill="${v===max?'var(--gold)':'var(--teal)'}"/>`+
      (i%3===0?`<text x="${(x+bw/2).toFixed(1)}" y="${H-8}" font-size="9" fill="var(--txt-mute)" text-anchor="middle">${i}</text>`:'');
    }).join('')}
  </svg>`;
}
function warnIcon(){return `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2 1 21h22L12 2z"/><path d="M12 9v5M12 17v.5"/></svg>`;}

/* ---- section wrapper ---- */
function sec(num,title,note,inner){

}
function emptyEl(msg){return `<div class="empty">${esc(msg||'No data for this selection.')}</div>`;}
function rangeNote(){return rangeActive()?`Activity ${STATE.from||'…'} → ${STATE.to||'…'} · ${TZ_NOTE}`:TZ_NOTE;}

/* =================================================================================
   DRILL-DOWN
   ================================================================================= */
function drillSet(key){
  const p=cohortPool();
  const f={
    all:[()=>p,'All provisioned labs'],
    learners:[()=>p,'All labs (by learner)'],
    allhours:[()=>p,'All labs (compute hours)'],
    connected:[()=>p.filter(r=>r.connected),'Connected labs'],
    never:[()=>p.filter(r=>!r.connected),'Never-activated labs'],
    idle:[()=>p.filter(r=>r.idleh>0).sort((a,b)=>b.idleh-a.idleh),'Labs with idle compute'],
    used:[()=>p.filter(r=>r.ec2h>=T_USED),'Labs that used compute (>6 min)'],
    engaged:[()=>p.filter(r=>r.ec2h>=T_ENG),'Engaged labs (≥1 h)'],
  };
  if(f[key]) return {title:f[key][1], recs:f[key][0]()};
  const [k,arg]=key.split(/:(.+)/);
  if(k==='course') return {title:'Course · '+arg, recs:p.filter(r=>r.course===arg)};
  if(k==='band') return {title:'Outcome · '+BAND_INFO[arg].label, recs:p.filter(r=>r.band===arg)};
  if(k==='user'){ const u=STATE.all[+arg].user; return {title:'Learner · '+maskEmail(u), recs:p.filter(r=>r.user===u)}; }
  if(k==='rec') return {title:'Lab record', recs:[STATE.all[+arg]]};
  if(k==='hist'){
    const m={'0':r=>r.ec2h===0,'t':r=>r.ec2h>0&&r.ec2h<0.1,'l':r=>r.ec2h>=0.1&&r.ec2h<1,'a1':r=>r.ec2h>=1&&r.ec2h<3,'a2':r=>r.ec2h>=3&&r.ec2h<6,'p1':r=>r.ec2h>=6&&r.ec2h<12,'p2':r=>r.ec2h>=12};
    return {title:'Compute band', recs:p.filter(m[arg])};
  }
  return {title:'Selection', recs:[]};
}
let DRILL=[];
function openDrill(key){
  const {title,recs}=drillSet(key); DRILL=recs;
  $('#drTitle').textContent=title;
  $('#drSub').textContent = STATE.cohort==='__all'?'All cohorts':STATE.cohort;
  $('#drCount').textContent = recs.length+' record'+(recs.length===1?'':'s');
  const body=$('#drBody');
  body.innerHTML = recs.length ? recs.map(r=>`
    <details class="dr-item" data-i="${r.i}">
      <summary>
        <div><div class="nm">${esc(maskName(r.userName))} <span class="band ${r.band}" style="margin-left:6px">${BAND_INFO[r.band].label}</span></div>
        <div class="meta">${esc(maskEmail(r.user))} · ${esc(r.course)}</div></div>
        <div style="text-align:right"><div class="tag">${r.ec2h.toFixed(2)} h</div><div class="meta">${r.fs?fmtDT(r.fs):'never connected'}</div></div>
      </summary>
      <div class="dr-raw" data-lazy="1"></div>
    </details>`).join('') : emptyEl();
  $('#scrim').classList.add('on'); $('#drawer').classList.add('on');
}
function lazyRaw(det){
  const box=det.querySelector('.dr-raw'); if(!box || box.dataset.done) return;
  const r=STATE.all[+det.dataset.i];
  const rows=Object.entries(r.raw).map(([k,v])=>{
    let val=v; if(MASK_PII && k==='User') val=maskEmail(v); if(MASK_PII && k==='User Name') val=maskName(v);
    return `<div><span class="k">${esc(k)}</span><span>${esc(val||'—')}</span></div>`;
  }).join('');
  box.innerHTML=rows; box.dataset.done='1';
}
function closeDrill(){ $('#scrim').classList.remove('on'); $('#drawer').classList.remove('on'); }

/* =================================================================================
   CSV EXPORT (full, unmasked)
   ================================================================================= */
function exportCSV(recs,name){
  if(!recs.length) return;
  const cols=Object.keys(recs[0].raw);
  const q=v=>{v=String(v==null?'':v); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;};
  const csv=[cols.join(',')].concat(recs.map(r=>cols.map(c=>q(r.raw[c])).join(','))).join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`${name}-${new Date().toISOString().slice(0,10)}.csv`; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),2000);
}

/* =================================================================================
   METHODOLOGY
   ================================================================================= */
function methodology(){
  return `<details class="method"><summary>How these metrics are derived</summary><div class="body">
    <h4>One row = one provisioned lab</h4>Each record is a single learner enrolled in a single course (a provisioned EC2 lab instance). 547 such instances across two cohorts in the sample.
    <h4>Compute hours</h4><code>Hours Used</code> is taken as the canonical compute figure — verified to equal <code>EC2 Total Time</code> exactly. It measures instance uptime (the cost driver), not necessarily active work.
    <h4>Engaged hours & idle</h4><code>Connection Time</code> is parsed for actual engaged time (it is always ≤ uptime, and present only when a session occurred). <b>Idle compute</b> = uptime minus engaged time; for never-connected labs the entire uptime counts as idle. This is a heuristic for waste, not a billing figure.
    <h4>Activation</h4>A lab is "connected" if a <code>First Seen</code> timestamp exists. 269 of 547 sample labs (49%) were never connected — provisioned but unused.
    <h4>Outcome bands</h4>Each lab falls into exactly one band by its strongest compute signal: Never connected · Trivial (&lt;6 min) · Light (&lt;1 h) · Active (1–6 h) · Power (≥6 h). Thresholds are editable constants.
    <h4>Timestamps</h4>${esc(TZ_NOTE)} Date integers (<code>Y×10000+M×100+D</code>) drive range filters; no <code>Date()</code>/UTC parsing is used. The date range filters the activity-based sections (trend, rhythm); the cohort selector filters everything. Never-connected labs have no activity date and are therefore excluded from date-windowed views (shown honestly as empty states).
    <h4>Duration format</h4>Source durations appear two ways — <code>11:11:51 PM</code> (12-hour clock, &lt;24 h) and <code>1 day, 9:15:18</code> (≥24 h). Both are parsed; display uses <code>Hours Used</code> where possible.
    <h4>Privacy</h4>${MASK_PII?'Learner emails and names are masked on screen (and in raw views). Full values appear only in CSV exports you download. The app is password-gated and runs entirely in your browser — no server.':'Full learner identifiers are shown to the signed-in admin. The app is password-gated and browser-only; nothing is sent to a server.'}
  </div></details>
  <footer>Decrypted &amp; rendered in-browser · AES-256-GCM · session expires after ${SESSION_TIMEOUT_MINS} min idle · noindex.</footer>`;
}

/* =================================================================================
   EVENT DELEGATION
   ================================================================================= */
document.addEventListener('click',e=>{
  const d=e.target.closest('[data-drill]'); if(d){ openDrill(d.dataset.drill); return; }
});
$('#drClose').onclick=closeDrill; $('#scrim').onclick=closeDrill;
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDrill();});
$('#drawer').addEventListener('toggle',e=>{const det=e.target.closest('.dr-item'); if(det&&det.open)lazyRaw(det);},true);
$('#drCsv').onclick=()=>exportCSV(DRILL,'cohort-selection');

/* =================================================================================
   SESSION + AUTH
   ================================================================================= */
const SKEY='cohort_sess';
let idleTimer;
function touch(){ clearTimeout(idleTimer); idleTimer=setTimeout(lock, SESSION_TIMEOUT_MINS*60000); sessionStorage.setItem(SKEY, String(Date.now())); }
function lock(){ sessionStorage.removeItem(SKEY); sessionStorage.removeItem('cohort_pw'); location.reload(); }
async function unlock(pw){
  const h=await sha256hex(pw);
  if(h!==PASSWORD_HASH){ $('#gerr').textContent='Incorrect password.'; return; }
  $('#gerr').textContent='Decrypting…';
  try{
    const res=await fetch(DATA_FILE,{cache:'no-store'});
    if(!res.ok) throw new Error('Data file not found ('+res.status+'). Check DATA_FILE / repo path.');
    const buf=await res.arrayBuffer();
    const text=await maybeDecrypt(buf, pw);
    STATE.all=buildRecords(text);
    if(!STATE.all.length) throw new Error('No rows parsed — wrong file or wrong password.');
    sessionStorage.setItem('cohort_pw', pw); touch();
    $('#gate').style.display='none'; $('#app').style.display='block';
    render();
  }catch(err){ $('#gerr').textContent=err.message||'Decryption failed (wrong password?).'; }
}
$('#enter').onclick=()=>unlock($('#pw').value);
$('#pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock($('#pw').value);});
['click','keydown','mousemove','scroll'].forEach(ev=>document.addEventListener(ev,()=>{if($('#app').style.display==='block')touch();},{passive:true}));
// auto-resume valid session
(async()=>{
  const t=sessionStorage.getItem(SKEY), pw=sessionStorage.getItem('cohort_pw');
  if(t && pw && (Date.now()-+t) < SESSION_TIMEOUT_MINS*60000){ unlock(pw); }
})();
</script>
</body>
